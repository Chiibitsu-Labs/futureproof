<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Futureproof Me ~ get more human, not less</title>
  <desc id="desc">Open Graph image for the Futureproof Me founding cohort from Chiibitsu Labs.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="8%" r="72%">
      <stop offset="0%" stop-color="#e7dcff"/>
      <stop offset="44%" stop-color="#f3edff"/>
      <stop offset="100%" stop-color="#fffdf9"/>
    </radialGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="100%">
