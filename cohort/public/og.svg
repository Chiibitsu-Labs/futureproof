      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#5b2a9e" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#glow)"/>
  <circle cx="600" cy="-58" r="360" fill="#a78bfa" opacity="0.22"/>
  <circle cx="1048" cy="128" r="112" fill="#ffd9c2" opacity="0.72"/>
  <circle cx="126" cy="520" r="148" fill="#f7c8e0" opacity="0.52"/>
